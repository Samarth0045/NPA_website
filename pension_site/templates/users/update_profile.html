{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-primary text-center mb-4">Update Your Profile</h2>
    <form method="POST" class="shadow p-4 rounded bg-white" style="max-width: 500px; margin: auto;">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors|striptags }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-success w-100">Save Changes</button>
    </form>
    <div class="text-center mt-3">
        <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Back to Profile</a>
    </div>
</div>
</body>
</html>
